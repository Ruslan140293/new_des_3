<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Exchange37 — Криптообмен v2</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
:root{
  --bg:#05080f;
  --bg2:#080c15;
  --surface:#0b1020;
  --surface2:#0f1529;
  --gold:#C9A84C;
  --gold2:#F0C96A;
  --golddim:rgba(201,168,76,.12);
  --goldglow:rgba(201,168,76,.28);
  --border:rgba(201,168,76,.14);
  --border2:rgba(201,168,76,.3);
  --text:#EDE8DC;
  --text2:#7A8499;
  --muted:#2a3450;
  --green:#4ADE80;
  --r:6px;
  --serif:'Playfair Display',serif;
  --mono:'JetBrains Mono',monospace;
  --sans:'Inter',sans-serif;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--sans);overflow-x:hidden;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* MESH BG */
.mesh{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.mesh::before{content:'';position:absolute;width:800px;height:800px;top:-200px;right:-200px;background:radial-gradient(circle,rgba(201,168,76,.06) 0%,transparent 70%);animation:gfloat 18s ease-in-out infinite alternate}
.mesh::after{content:'';position:absolute;width:600px;height:600px;bottom:-100px;left:-100px;background:radial-gradient(circle,rgba(201,168,76,.04) 0%,transparent 70%);animation:gfloat 22s ease-in-out infinite alternate-reverse}
@keyframes gfloat{0%{transform:translate(0,0) scale(1)}100%{transform:translate(40px,30px) scale(1.1)}}

/* ─── HEADER ─── */
.hdr{position:fixed;top:0;left:0;right:0;z-index:100;height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 56px;border-bottom:1px solid var(--border);background:rgba(5,8,15,.82);backdrop-filter:blur(18px);transition:all .3s}
.hdr.scrolled{background:rgba(5,8,15,.97)}
.logo{display:flex;align-items:center;gap:11px;text-decoration:none;font-family:var(--mono);font-weight:600;font-size:17px;color:var(--text);letter-spacing:-.5px}
.logo-mark{display:flex;align-items:center;gap:0;font-family:var(--mono);font-size:12px;font-weight:600;background:linear-gradient(135deg,var(--gold),var(--gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.logo-hex{width:32px;height:32px;border:1.5px solid var(--border2);border-radius:6px;display:flex;align-items:center;justify-content:center;background:var(--golddim)}
.nav{display:flex;gap:36px}
.nav a{color:var(--text2);font-size:13px;font-weight:500;text-decoration:none;letter-spacing:.2px;transition:color .2s;position:relative}
.nav a::after{content:'';position:absolute;bottom:-4px;left:0;right:0;height:1px;background:var(--gold);transform:scaleX(0);transition:transform .2s;transform-origin:left}
.nav a:hover{color:var(--gold)}
.nav a:hover::after{transform:scaleX(1)}
.hdr-r{display:flex;align-items:center;gap:12px}
.langs{display:flex;border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.lang{padding:5px 10px;font-size:11px;font-weight:700;letter-spacing:.8px;color:var(--text2);background:none;border:none;cursor:pointer;font-family:var(--mono);transition:all .2s}
.lang.on{background:var(--gold);color:#000}
.btn-login{padding:8px 20px;border:1px solid var(--border2);color:var(--gold);background:transparent;border-radius:var(--r);font-size:13px;font-weight:600;cursor:pointer;font-family:var(--mono);letter-spacing:.3px;transition:all .2s}
.btn-login:hover{background:var(--golddim);box-shadow:0 0 18px var(--goldglow)}
.ham{display:none;flex-direction:column;gap:5px;cursor:pointer;background:none;border:none;padding:4px}
.ham span{width:20px;height:1.5px;background:var(--text);display:block;border-radius:1px;transition:all .3s}

/* ─── HERO ─── */
.hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:120px 40px 80px;position:relative;z-index:1}
.hero-eyebrow{display:flex;align-items:center;gap:10px;margin-bottom:20px}
.hero-eyebrow span{font-family:var(--mono);font-size:11px;letter-spacing:2px;color:var(--gold);text-transform:uppercase}
.hero-eyebrow::before,.hero-eyebrow::after{content:'';height:1px;width:40px;background:var(--border2)}
.hero-h{font-family:var(--serif);font-size:clamp(40px,6vw,80px);font-weight:800;text-align:center;line-height:1.05;color:var(--text);margin-bottom:18px;letter-spacing:-1px}
.hero-h em{font-style:italic;background:linear-gradient(120deg,var(--gold) 20%,var(--gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-sub{color:var(--text2);font-size:16px;text-align:center;max-width:460px;line-height:1.7;margin-bottom:52px;text-wrap:pretty}

/* ─── FORM ─── */
.form-shell{width:100%;max-width:980px;position:relative}
.form-shell::before{content:'';position:absolute;inset:-1px;border-radius:18px;background:linear-gradient(135deg,var(--gold) 0%,transparent 40%,transparent 60%,var(--gold) 100%);opacity:.18;z-index:0;animation:border-pulse 4s ease-in-out infinite alternate}
@keyframes border-pulse{0%{opacity:.1}100%{opacity:.25}}
.form-inner{position:relative;z-index:1;background:rgba(11,16,32,.96);backdrop-filter:blur(32px);border:1px solid var(--border);border-radius:16px;padding:40px}

/* STEP TABS */
.form-tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:32px;gap:0}
.ftab{flex:1;padding:12px;text-align:center;font-family:var(--mono);font-size:12px;font-weight:600;letter-spacing:.8px;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px}
.ftab.on{color:var(--gold);border-bottom-color:var(--gold)}
.ftab .step-n{width:20px;height:20px;border-radius:50%;border:1.5px solid currentColor;display:flex;align-items:center;justify-content:center;font-size:10px}
.ftab.done-tab .step-n{background:var(--gold);border-color:var(--gold);color:#000}
.form-cols{display:grid;grid-template-columns:1fr 40px 1fr;gap:0;align-items:start}

/* FIELD */
.fg{margin-bottom:14px}
.fl{display:block;font-size:10px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:var(--text2);margin-bottom:6px;font-family:var(--mono)}
.fi,.fs{width:100%;padding:11px 14px;background:var(--bg2);border:1px solid rgba(255,255,255,.07);border-radius:var(--r);color:var(--text);font-size:14px;outline:none;font-family:var(--sans);transition:border-color .2s,box-shadow .2s;appearance:none;-webkit-appearance:none}
.fi:focus,.fs:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,168,76,.1)}
.fi:disabled{opacity:.6;cursor:not-allowed;font-family:var(--mono)}
.fi.comm{color:var(--gold);font-family:var(--mono);font-size:13px;background:var(--golddim);border-color:var(--border)}
.fi.recv{color:var(--green);font-family:var(--mono);font-size:13px;background:rgba(74,222,128,.06);border-color:rgba(74,222,128,.18)}
.sw{position:relative}
.sw::after{content:'▾';position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--text2);pointer-events:none;font-size:11px}
.curr-pill{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.curr-badge{padding:4px 10px;border-radius:20px;font-family:var(--mono);font-size:11px;font-weight:600;border:1px solid currentColor;letter-spacing:.5px}

/* DIVIDER */
.fdiv{display:flex;flex-direction:column;align-items:center;justify-content:center;padding-top:36px;gap:6px}
.fline{flex:1;width:1px;background:var(--border)}
.swap{width:38px;height:38px;border-radius:50%;border:1px solid var(--border2);color:var(--gold);background:var(--golddim);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all .3s;flex-shrink:0}
.swap:hover{background:var(--gold);color:#000;box-shadow:0 0 20px var(--goldglow);transform:rotate(180deg)}

/* CHECK */
.cbx{display:flex;align-items:flex-start;gap:9px;margin-top:10px}
.cbx input{width:14px;height:14px;flex-shrink:0;margin-top:2px;accent-color:var(--gold);cursor:pointer}
.cbx label{font-size:12px;color:var(--text2);cursor:pointer;line-height:1.55}
.cbx label a{color:var(--gold);text-decoration:none}

/* AML */
.aml{margin-top:28px;padding:24px;border:1px solid rgba(201,168,76,.22);border-radius:12px;background:rgba(201,168,76,.04);position:relative;overflow:hidden}
.aml::before{content:'AML';position:absolute;right:24px;top:50%;transform:translateY(-50%);font-family:var(--serif);font-size:80px;font-weight:800;color:rgba(201,168,76,.04);pointer-events:none;line-height:1}
.aml-title{font-family:var(--mono);font-size:12px;font-weight:600;letter-spacing:1.5px;color:var(--gold);text-transform:uppercase;margin-bottom:8px}
.aml-desc{font-size:13px;color:var(--text2);margin-bottom:16px;line-height:1.65;max-width:640px;text-wrap:pretty}
.aml-row{display:flex;flex-wrap:wrap;align-items:center;gap:18px}
.btn-bc{padding:9px 18px;border:1px solid var(--border2);color:var(--gold);background:var(--golddim);border-radius:var(--r);font-size:12px;font-weight:600;cursor:pointer;text-decoration:none;font-family:var(--mono);letter-spacing:.3px;display:inline-flex;align-items:center;gap:6px;transition:all .2s}
.btn-bc:hover{background:rgba(201,168,76,.22);box-shadow:0 0 14px var(--goldglow)}
.aml-opts{display:flex;flex-wrap:wrap;gap:16px}
.ropt{display:flex;align-items:center;gap:7px;cursor:pointer;font-size:13px;color:var(--text2)}
.ropt input{accent-color:var(--gold);width:14px;height:14px;cursor:pointer}

/* SUBMIT */
.ex-foot{margin-top:28px;display:flex;justify-content:center}
.btn-main{padding:15px 56px;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#0a0d1a;border:none;border-radius:var(--r);font-size:15px;font-weight:700;cursor:pointer;font-family:var(--mono);letter-spacing:.5px;transition:all .25s;box-shadow:0 8px 28px var(--goldglow)}
.btn-main:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 16px 44px var(--goldglow)}
.btn-main:disabled{opacity:.35;cursor:not-allowed}

/* ─── TICKER ─── */
.ticker{background:linear-gradient(90deg,var(--bg2),rgba(201,168,76,.04),var(--bg2));border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:12px 0;overflow:hidden;position:relative;z-index:1}
.tick-track{display:flex;gap:0;animation:marquee 30s linear infinite;white-space:nowrap}
.tick-item{display:inline-flex;align-items:center;gap:8px;padding:0 28px;border-right:1px solid var(--border);font-family:var(--mono);font-size:12px}
.tick-sym{color:var(--gold);font-weight:600}
.tick-val{color:var(--text)}
.tick-chg{font-size:11px}
.tick-up{color:var(--green)}
.tick-dn{color:#f87171}
@keyframes marquee{from{transform:translateX(0)}to{transform:translateX(-50%)}}

/* ─── PARTNERS ─── */
.partners{padding:60px 56px;border-bottom:1px solid var(--border);position:relative;z-index:1}
.p-lbl{font-family:var(--mono);font-size:10px;letter-spacing:2.5px;color:var(--text2);text-transform:uppercase;text-align:center;margin-bottom:28px}
.p-row{display:flex;flex-wrap:wrap;justify-content:center;gap:12px}
.p-pill{padding:8px 20px;border:1px solid var(--border);border-radius:40px;font-family:var(--mono);font-size:12px;color:var(--text2);transition:all .2s;cursor:default;letter-spacing:.5px}
.p-pill:hover{border-color:var(--gold);color:var(--gold);background:var(--golddim)}

/* ─── WHY ─── */
.why{padding:100px 56px;position:relative;z-index:1}
.section-header{margin-bottom:56px}
.section-tag{font-family:var(--mono);font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold);display:block;margin-bottom:10px}
.section-title{font-family:var(--serif);font-size:clamp(30px,4vw,52px);font-weight:700;line-height:1.1;letter-spacing:-1px}
.section-title em{font-style:italic;color:var(--gold)}
.section-sub{color:var(--text2);margin-top:12px;font-size:15px;line-height:1.7;max-width:480px;text-wrap:pretty}
.why-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.why-card{background:var(--surface);padding:32px;transition:background .3s}
.why-card:hover{background:var(--surface2)}
.why-num{font-family:var(--mono);font-size:10px;color:var(--gold);letter-spacing:1px;margin-bottom:12px;opacity:.6}
.why-icon{font-size:26px;margin-bottom:10px;display:block}
.why-t{font-family:var(--serif);font-size:18px;font-weight:700;margin-bottom:8px;letter-spacing:-.3px}
.why-d{font-size:13px;color:var(--text2);line-height:1.65;text-wrap:pretty}

/* ─── STATS ─── */
.stats{padding:0 56px 100px;position:relative;z-index:1}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);border:1px solid var(--border);border-radius:12px;overflow:hidden;background:var(--border);gap:1px}
.stat{background:var(--surface);padding:42px 32px;text-align:center;position:relative;overflow:hidden;transition:background .3s}
.stat:hover{background:var(--surface2)}
.stat::before{content:attr(data-label);position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);font-family:var(--serif);font-size:72px;font-weight:800;color:rgba(201,168,76,.04);white-space:nowrap;pointer-events:none}
.stat-n{font-family:var(--mono);font-size:clamp(32px,3.5vw,50px);font-weight:600;color:var(--gold);line-height:1;margin-bottom:8px}
.stat-l{font-size:12px;color:var(--text2);letter-spacing:.5px;font-family:var(--mono);text-transform:uppercase}

/* ─── RESERVES ─── */
.reserves{padding:100px 56px;background:var(--bg2);border-top:1px solid var(--border);position:relative;z-index:1}
.res-list{margin-top:48px;display:flex;flex-direction:column;gap:1px;border:1px solid var(--border);border-radius:12px;overflow:hidden;background:var(--border)}
.res-row{background:var(--surface);padding:20px 28px;display:grid;grid-template-columns:60px 1fr 1fr 140px 100px;align-items:center;gap:20px;transition:background .25s}
.res-row:hover{background:var(--surface2)}
.res-sym{font-family:var(--mono);font-size:22px;font-weight:600}
.res-name{font-size:13px;color:var(--text2)}
.res-amt{font-family:var(--mono);font-size:15px;font-weight:500;text-align:right}
.res-usd{font-family:var(--mono);font-size:13px;color:var(--text2);text-align:right}
.res-bar-wrap{height:4px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden}
.res-bar-fill{height:100%;border-radius:2px;transition:width 1.2s cubic-bezier(.16,1,.3,1)}
.live-dot{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:10px;color:var(--green);letter-spacing:.5px}
.live-dot::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--green);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ─── FOOTER ─── */
footer{padding:64px 56px 36px;border-top:1px solid var(--border);position:relative;z-index:1}
.ft-top{display:grid;grid-template-columns:1.8fr 1fr 1fr 1fr;gap:48px;max-width:1200px;margin:0 auto;padding-bottom:48px;border-bottom:1px solid var(--border)}
.ft-brand-name{font-family:var(--mono);font-size:16px;font-weight:600;color:var(--text);margin-bottom:12px}
.ft-brand-name em{color:var(--gold);font-style:normal}
.ft-desc{font-size:13px;color:var(--text2);line-height:1.7;max-width:260px;margin-bottom:18px;text-wrap:pretty}
.ft-badge{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10px;color:var(--text2);border:1px solid var(--border);padding:4px 10px;border-radius:4px;letter-spacing:.5px;margin-bottom:8px;margin-right:6px}
.ft-col h4{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--text2);margin-bottom:16px}
.ft-col ul{list-style:none}
.ft-col li{margin-bottom:10px}
.ft-col a{font-size:13px;color:var(--text2);text-decoration:none;transition:color .2s;font-family:var(--sans)}
.ft-col a:hover{color:var(--gold)}
.ft-bot{max-width:1200px;margin:28px auto 0;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
.ft-bot p{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:.2px}

/* ─── FU ─── */
.fu{opacity:0;transform:translateY(24px);transition:opacity .6s ease,transform .6s ease}
.fu.vis{opacity:1;transform:none}

/* ─── TWEAKS ─── */
#tp{position:fixed;bottom:22px;right:22px;z-index:999;background:var(--surface2);border:1px solid var(--border2);border-radius:12px;padding:18px;min-width:220px;box-shadow:0 20px 60px rgba(0,0,0,.7);display:none}
#tp.open{display:block}
#tp h3{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--gold);margin-bottom:14px;letter-spacing:.5px}
.tr{margin-bottom:12px}
.tr label{font-size:10px;color:var(--text2);display:block;margin-bottom:5px;font-family:var(--mono);letter-spacing:.5px;text-transform:uppercase}
.tr select,.tr input[type=range]{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:5px 8px;border-radius:4px;font-size:12px;outline:none;font-family:var(--mono)}
.tr input[type=color]{width:100%;height:28px;cursor:pointer;background:none;border:1px solid var(--border);border-radius:4px}

/* ─── RESPONSIVE ─── */
@media(max-width:900px){
  .hdr,.why,.stats,.reserves{padding-left:24px;padding-right:24px}
  .why-grid{grid-template-columns:1fr 1fr}
  .stats-grid{grid-template-columns:1fr 1fr}
  .res-row{grid-template-columns:40px 1fr 1fr;gap:12px}
  .res-usd,.res-bar-wrap{display:none}
  .ft-top{grid-template-columns:1fr 1fr;gap:28px}
  footer{padding:40px 24px 28px}
  .form-cols{grid-template-columns:1fr}
  .fdiv{flex-direction:row;padding:0 0 14px;justify-content:center}
  .fline{display:none}
  .nav{display:none}
  .ham{display:flex}
  .hdr{padding:0 24px}
  .hero{padding:100px 24px 60px}
}
@media(max-width:600px){
  .why-grid{grid-template-columns:1fr}
  .stats-grid{grid-template-columns:1fr 1fr}
  .ft-top{grid-template-columns:1fr}
  .p-row{gap:8px}
  .hdr-r .langs{display:none}
}
</style>
</head>
<body>
<div class="mesh"></div>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ── DATA ── */
const CUR = [
  {code:'BTC',name:'Bitcoin',  sym:'₿',color:'#F7931A'},
  {code:'ETH',name:'Ethereum', sym:'Ξ',color:'#627EEA'},
  {code:'USDT',name:'Tether',  sym:'₮',color:'#26A17B'},
  {code:'USD',name:'US Dollar',sym:'$',color:'#85C1E9'},
  {code:'EUR',name:'Euro',     sym:'€',color:'#A8D8EA'},
  {code:'GBP',name:'Pound',    sym:'£',color:'#C0B0E0'},
];
const COUNTRIES={UA:{name:'Украина',cities:['Киев','Харьков','Одесса','Днепр','Запорожье','Львов']},PL:{name:'Польша',cities:['Варшава','Краков','Вроцлав','Гданьск']},DE:{name:'Германия',cities:['Берлин','Мюнхен','Гамбург','Франкфурт','Кёльн']},CZ:{name:'Чехия',cities:['Прага','Брно']},AT:{name:'Австрия',cities:['Вена','Грац']},KZ:{name:'Казахстан',cities:['Алматы','Астана']}};
const RATES={BTC:66200,ETH:3180,USDT:1,USD:1,EUR:1.085,GBP:1.27};

const WHY=[

function useFadeUp(ref){useEffect(()=>{const el=ref.current;if(!el)return;const obs=new IntersectionObserver(([e])=>{if(e.isIntersecting){el.classList.add('vis');obs.disconnect();}},{threshold:.1});obs.observe(el);return()=>obs.disconnect();},[]);}

function useCounter(target,active,fmt){
  const[v,setV]=useState(0);
  useEffect(()=>{if(!active)return;let s=null;const dur=1800;const step=ts=>{if(!s)s=ts;const p=Math.min((ts-s)/dur,1);const e=1-Math.pow(1-p,3);setV(e*target);if(p<1)requestAnimationFrame(step);};requestAnimationFrame(step);},[active,target]);
  return fmt?fmt(v):(v>=100?Math.round(v):v.toFixed(1));
}

/* ── STAT ── */
function StatCard({val,suf,pre,lbl,lb,fmt}){
  const ref=useRef();
  const[on,setOn]=useState(false);
  const disp=useCounter(val,on,fmt);
  useEffect(()=>{const obs=new IntersectionObserver(([e])=>{if(e.isIntersecting){setOn(true);obs.disconnect();}},{threshold:.5});obs.observe(ref.current);return()=>obs.disconnect();},[]);
  return(
    <div className="stat" ref={ref} data-label={lb}>
      <div className="stat-n">{pre||''}{disp}{suf||''}</div>
      <div className="stat-l">{lbl}</div>
    </div>
  );
}

/* ── TWEAKS ── */
const TWEAK_DEFAULTS2 = /*EDITMODE-BEGIN*/{"accentColor":"#C9A84C","commissionPct":1.5,"language":"RU"}/*EDITMODE-END*/;

function Tweaks({onCommChange}){
  const[open,setOpen]=useState(false);
  const[vals,setVals]=useState(TWEAK_DEFAULTS2);
  useEffect(()=>{
    const fn=e=>{if(e.data?.type==='__activate_edit_mode')setOpen(true);if(e.data?.type==='__deactivate_edit_mode')setOpen(false);};
    window.addEventListener('message',fn);
    window.parent.postMessage({type:'__edit_mode_available'},'*');
    return()=>window.removeEventListener('message',fn);
  },[]);
  const set=(k,v)=>{const n={...vals,[k]:v};setVals(n);if(k==='accentColor')document.documentElement.style.setProperty('--gold',v);if(k==='commissionPct')onCommChange(parseFloat(v));window.parent.postMessage({type:'__edit_mode_set_keys',edits:n},'*');};
  if(!open)return null;
  return(
    <div id="tp" className="open">
      <h3>// Tweaks</h3>
      <div className="tr"><label>Акцент</label><input type="color" value={vals.accentColor} onChange={e=>set('accentColor',e.target.value)}/></div>
      <div className="tr"><label>Комиссия {vals.commissionPct}%</label><input type="range" min=".5" max="5" step=".1" value={vals.commissionPct} onChange={e=>set('commissionPct',e.target.value)}/></div>
      <div className="tr"><label>Язык</label><select value={vals.language} onChange={e=>set('language',e.target.value)}>{['RU','EN','UA'].map(l=><option key={l}>{l}</option>)}</select></div>
    </div>
  );
}
